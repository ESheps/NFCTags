<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_ACCESS</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #terminal { width: 90%; max-width: 400px; }
        .line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.2s forwards; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #00ff41; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const lines = [
            "> INITIALIZING HANDSHAKE...",
            "> BYPASSING SECURE ELEMENT...",
            "> ACCESS GRANTED: [USER_FORENSIC]",
            "> SCANNING LOCAL NETWORK...",
            "> WARNING: UNKNOWN TAG DETECTED",
            "> PAYLOAD READY.",
            "> HELLO, KIRBY."
        ];
        const term = document.getElementById('terminal');
        let i = 0;
        function printLine() {
            if (i < lines.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = lines[i] + (i === lines.length - 1 ? '<span class="cursor"></span>' : '');
                term.appendChild(div);
                i++;
                setTimeout(printLine, 600);
            }
        }
        printLine();
    </script>
</body>
</html>
