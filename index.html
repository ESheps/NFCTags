<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
        #log { font-size: 12px; line-height: 1.2; text-shadow: 0 0 5px #0f0; }
        .red { color: #f00; text-shadow: 0 0 8px #f00; font-weight: bold; }
        .glitch { animation: flash 0.1s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="log"></div>
    <script>
        const log = document.getElementById('log');
        const data = [
            "> [OK] CONNECTION ESTABLISHED", "> BYPASSING KERNEL PANIC...", "> EXPLOITING CVE-2026-9295...", 
            "> ROOT ACCESS GRANTED", "> DOWNLOADING PRIVATE_KEYS...", "> UPLOADING USER_DATA.DB...", 
            "> CLONING MESSAGES...", "> WIPING LOGS...", "> [CRITICAL] SYSTEM OVERRIDE DETECTED"
        ];
        let i = 0;
        function addLine() {
            const p = document.createElement('div');
            if (i >= data.length) {
                p.innerHTML = `<span class="red glitch">CAUTION: SYSTEM WIPE IN PROGRESS... ${Math.random().toString(16).slice(2,8)}</span>`;
            } else {
                p.textContent = data[i++];
            }
            log.appendChild(p);
            if (log.childNodes.length > 25) log.removeChild(log.firstChild);
            setTimeout(addLine, i >= data.length ? 50 : 400);
        }
        // Force full screen on first tap/interaction
        document.body.onclick = () => document.documentElement.requestFullscreen();
        addLine();
    </script>
</body>
</html>
