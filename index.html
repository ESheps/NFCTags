<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S21_FORENSIC_TOOLKIT</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: monospace; padding: 20px; }
        .card { border: 1px solid var(--neon); padding: 15px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        h2 { margin-top: 0; font-size: 14px; border-bottom: 1px solid var(--neon); padding-bottom: 5px; }
        input, button { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; box-sizing: border-box; margin: 5px 0; }
        button:active { background: var(--neon); color: #000; }
        #output { font-size: 12px; white-space: pre-wrap; background: #000; padding: 10px; min-height: 50px; }
    </style>
</head>
<body>
    <h3>[ROOT@FORENSIC_LAB_S21]</h3>
    
    <div class="card">
        <h2>1. NETWORK_INFO</h2>
        <button onclick="getIP()">FETCH_IP_DATA</button>
        <div id="ip-out" style="font-size:11px">---</div>
    </div>

    <div class="card">
        <h2>2. MAC_VENDOR_LOOKUP</h2>
        <input type="text" id="mac" placeholder="XX:XX:XX:XX:XX:XX">
        <button onclick="lookupMAC()">QUERY_DATABASE</button>
    </div>

    <div class="card">
        <h2>3. SECURE_BURN_NOTE</h2>
        <textarea id="note" style="width:100%;background:#111;color:var(--neon);border:1px solid var(--neon)" rows="3"></textarea>
        <button onclick="genLink()">GENERATE_LINK</button>
    </div>

    <script>
        async function getIP() {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('ip-out').innerText = `IP: ${data.ip}\nORG: ${data.org}\nLOC: ${data.city}, ${data.country_name}`;
        }
        function lookupMAC() {
            const mac = document.getElementById('mac').value;
            window.open(`https://macvendors.com/query/${mac}`, '_blank');
        }
        function genLink() {
            const note = btoa(document.getElementById('note').value);
            alert(`Encrypted URI created. Copy this:\n?data=${note}`);
        }
    </script>
</body>
</html>
